# Fly.io deployment for the Engine Anthropic proxy.
# Free-tier sized: 256MB RAM, shared CPU, single region, 1GB persistent volume
# for the SQLite spend database.

app = "engine-proxy"
primary_region = "ord"

[build]

[env]
  DB_PATH = "/data/spend.db"
  PORT = "8000"
  DAILY_LIMIT_USD = "0.50"
  TOTAL_LIMIT_USD = "5.00"

[mounts]
  source = "engine_proxy_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
