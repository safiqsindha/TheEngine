# ═══════════════════════════════════════════════════════════════════════════════
# THE ENGINE — Hardware Configuration
# FRC Team 2950 (The Devastators)
#
# STATUS: Populated from confirmed swerve-test branch (hardware-verified 2026).
#
# INSTRUCTIONS:
#   1. Edit values below if hardware changes
#   2. Run: python tools/generate_configs.py
#   3. All YAGSL JSON configs and CAN_ID_REFERENCE.md regenerate automatically
#
# This file is the SINGLE SOURCE OF TRUTH for all hardware parameters.
# Do NOT edit the generated YAGSL JSON files directly — edit here and regenerate.
# ═══════════════════════════════════════════════════════════════════════════════

[swerve_module]
# Thrifty Swerve with NEO + SPARK MAX (confirmed on hardware)
module_type = thrifty_swerve
drive_motor = neo_brushless
steer_motor = neo_brushless
motor_controller = sparkmax
absolute_encoder = thrifty_10pin

# How is the Thrifty 10-pin encoder connected?
# "attached" = plugged into SPARK MAX data port (confirmed — reads through SPARK MAX)
encoder_connection = attached

# Drive gear ratio — confirmed from YAGSL JSON (swerve-test branch)
drive_gear_ratio = 6.23

# Steer gear ratio — Thrifty Swerve standard
steer_gear_ratio = 25

# Wheel diameter in inches (confirmed from YAGSL physicalproperties.json)
wheel_diameter_inches = 4

[gyroscope]
# Confirmed from swerve-test swervedrive.json
gyro_type = adis16470

# ADIS16470 connects via SPI to roboRIO — id is unused but must be 0
gyro_id = 0

[chassis]
# Center-to-center distance between wheel contact patches (inches)
# Confirmed from swerve-test module JSONs (location = ±11 inches)
trackwidth_inches = 22
wheelbase_inches = 22

[can_bus]
canbus_name = rio

# CAN IDs — SPARK MAX drive motors (confirmed from swerve-test branch)
front_left_drive_id  = 13
front_right_drive_id = 7
back_left_drive_id   = 10
back_right_drive_id  = 8

# CAN IDs — SPARK MAX steer motors (confirmed from swerve-test branch)
front_left_steer_id  = 5
front_right_steer_id = 19
back_left_steer_id   = 6
back_right_steer_id  = 12

# CAN IDs — Other subsystems
flywheel_left_vortex_id  = 23
flywheel_right_vortex_id = 22
flywheel_front_wheel_id  = 15
flywheel_back_wheel_id   = 2
intake_left_arm_id       = 16
intake_right_arm_id      = 17
intake_wheel_id          = 4
conveyor_motor_id        = 21
conveyor_spindexer_id    = 18
climber_vertical_id      = 11
# CAN ID conflict resolved: SideClaw moved from 18 to 20 (was conflicting with spindexer)
side_claw_id             = 20

[encoders]
# encoder_connection = attached → encoder ports below are IGNORED
# Encoder reads through the SPARK MAX data port automatically.
# These are only used if encoder_connection = "thrifty" (roboRIO analog).
front_left_encoder_port  = 0
front_right_encoder_port = 1
back_left_encoder_port   = 2
back_right_encoder_port  = 3

[inversions]
front_left_drive_inverted    = false
front_left_steer_inverted    = false
front_left_encoder_inverted  = false
front_right_drive_inverted   = false
front_right_steer_inverted   = false
front_right_encoder_inverted = false
back_left_drive_inverted     = false
back_left_steer_inverted     = false
back_left_encoder_inverted   = false
back_right_drive_inverted    = false
back_right_steer_inverted    = false
back_right_encoder_inverted  = false

[encoder_offsets]
# TODO: Run the YAGSL encoder calibration routine on the physical robot.
# With all modules pointing forward, read the raw offsets from SmartDashboard
# (Drive/Module X/Absolute Encoder Position) and paste them here, then
# update the absoluteEncoderOffset fields in the module JSON files.
front_left_offset  = 0.0
front_right_offset = 0.0
back_left_offset   = 0.0
back_right_offset  = 0.0

[current_limits]
# Confirmed from swerve-test physicalproperties.json
drive_current_limit = 40
steer_current_limit = 20

[pid]
# Confirmed tuned on hardware (swerve-test pidfproperties.json)
drive_p = 0.0020645
drive_i = 0.0
drive_d = 0.0
drive_f = 0.0
steer_p = 0.0020645
steer_i = 0.0
steer_d = 0.0
steer_f = 0.0

[other_hardware]
power_distribution = rev_pdh
limelight_count    = 1
limelight_version  = 3
limelight_name     = limelight
led_pwm_port       = 0
led_count          = 60
